name: Terraform Infrastructure Pipeline

on:
  # push:
  #   branches:
  #     - dev
    # paths:
    #   - 'terraform/**'
    #   - '.github/workflows/infra.yml'

  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  TF_WORKING_DIR: ./terraform

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      # Terraform Init
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Terraform Format Check
      # - name: Terraform Format Check
      #   working-directory: ${{ env.TF_WORKING_DIR }}
      #   run: terraform fmt -check

      # Terraform Validate
      # - name: Terraform Validate
      #   working-directory: ${{ env.TF_WORKING_DIR }}
      #   run: terraform validate

      # # Terraform Plan
      # - name: Terraform Plan
      #   working-directory: ${{ env.TF_WORKING_DIR }}
      #   run: terraform plan -out=tfplan 

      # Terraform Apply
      - name: Terraform Apply networking
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=module.networking

      - name: Terraform Apply ecr
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=module.ecr

      - name: Terraform Apply eks
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=module.eks
        
      - name: Terraform Apply rds
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=module.rds

      # Install the kube-prometheus-stack helm release first so the
      # ServiceMonitor CRD exists before any kubernetes_manifest resources
      # are planned. Without this, plan-time schema validation fails with:
      #   "no matches for kind \"ServiceMonitor\" in group \"monitoring.coreos.com\""
      - name: Terraform Apply monitoring (CRDs via kube-prometheus-stack)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=module.monitoring.helm_release.kube_prometheus_stack

      - name: Terraform Apply monitoring
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=module.monitoring





