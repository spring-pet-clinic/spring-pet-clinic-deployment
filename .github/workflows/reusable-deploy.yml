# =============================================================================
# reusable-deploy.yml  —  Reusable workflow (workflow_call)
# Branch: feature/cicd-templates
#
# PURPOSE:
#   Deploys ONE Spring PetClinic microservice to EKS.
#   Called by caller workflows (test-one-service.yml / deploy-all-services.yml).
#
# HOW IT WORKS:
#   1. Authenticates to AWS using IAM credentials stored as GitHub Secrets
#   2. Logs in to Amazon ECR (eu-west-1) to pull images
#   3. Configures kubectl to talk to the EKS cluster
#   4. Replaces IMAGE_PLACEHOLDER in the K8s manifest with the real ECR image URI
#   5. Applies the manifest and waits for the deployment to roll out
#
# CALLER PASSES:
#   inputs  → service-name, image-tag, manifest-path, aws-region,
#             eks-cluster-name, k8s-namespace
#   secrets → AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID       IAM user key with ECR pull + EKS access
#   AWS_SECRET_ACCESS_KEY   IAM user secret
#   AWS_ACCOUNT_ID          12-digit AWS account number
# =============================================================================
 
name: Reusable — Deploy Single Service to EKS
 
on:
  workflow_call:
    inputs:
      # ── Required ───────────────────────────────────────────────────────────
      service-name:
        description: >
          Short service name used in ECR repo and K8s Deployment name.
          Examples: spring-petclinic-config-server, spring-petclinic-api-gateway
        required: true
        type: string
 
      manifest-path:
        description: >
          Path to the Kubernetes manifest file (or directory) for this service,
          relative to the repo root.
          Example: k8s/config-server/deployment.yaml
                   k8s/config-server/          (applies all files in dir)
        required: true
        type: string
 
      # ── Optional (have safe defaults) ─────────────────────────────────────
      image-tag:
        description: >
          ECR image tag to deploy.
          Defaults to 'latest'. For versioned deploys pass the build tag,
          e.g. 'build-42'.
        required: false
        type: string
        default: 'latest'
 
      aws-region:
        description: AWS region where ECR and EKS live.
        required: false
        type: string
        default: 'eu-west-1'
 
      eks-cluster-name:
        description: Name of the EKS cluster to deploy into.
        required: false
        type: string
        default: 'petclinic-eks-cluster'
 
      k8s-namespace:
        description: Kubernetes namespace to deploy into.
        required: false
        type: string
        default: 'petclinic'
 
      rollout-timeout:
        description: >
          How long (in seconds) to wait for the deployment rollout to finish.
          Increase for slow-starting services like config-server.
        required: false
        type: number
        default: 300
 
    secrets:
      AWS_ACCESS_KEY_ID:
        description: IAM Access Key ID with ECR pull and EKS deploy permissions.
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: IAM Secret Access Key.
        required: true
      AWS_ACCOUNT_ID:
        description: 12-digit AWS Account ID (used to build the ECR image URI).
        required: true
 
# ── Job: deploy ──────────────────────────────────────────────────────────────
jobs:
  deploy:
    name: "Deploy ${{ inputs.service-name }}"
    #runs-on: ubuntu-latest   # GitHub-hosted runner — no self-hosted runner needed
    runs-on: self-hosted   # self-hosted runner needed - testing
 
    steps:
      # ── 1. Check out the deployment repo (contains K8s manifests) ──────────
      - name: Checkout deployment repo
        uses: actions/checkout@v4
 
      # ── 2. Authenticate to AWS ─────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ inputs.aws-region }}
 
      # ── 3. Log in to ECR (needed for kubectl to pull the image) ───────────
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        # This step exports REGISTRY output used below to construct the image URI
 
      # ── 4. Install kubectl ────────────────────────────────────────────────
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
 
      # ── 5. Configure kubeconfig for EKS ───────────────────────────────────
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ inputs.aws-region }} \
            --name   ${{ inputs.eks-cluster-name }}
          echo "✅ kubeconfig configured for cluster: ${{ inputs.eks-cluster-name }}"
 
      # ── 6. Ensure namespace exists ────────────────────────────────────────
      - name: Ensure namespace exists
        run: |
          kubectl get namespace ${{ inputs.k8s-namespace }} \
            || kubectl create namespace ${{ inputs.k8s-namespace }}
          echo "✅ Namespace ready: ${{ inputs.k8s-namespace }}"
 
      # ── 7. Build ECR image URI and apply manifest ─────────────────────────
      - name: Deploy ${{ inputs.service-name }}
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com
          SERVICE:       ${{ inputs.service-name }}
          TAG:           ${{ inputs.image-tag }}
          MANIFEST:      ${{ inputs.manifest-path }}
          NAMESPACE:     ${{ inputs.k8s-namespace }}
        run: |
          IMAGE="${ECR_REGISTRY}/${SERVICE}:${TAG}"
          echo "📦 Deploying image: ${IMAGE}"
 
          # Replace IMAGE_PLACEHOLDER in the manifest with the real ECR URI
          # Works for both a single file and all files in a directory
          if [ -d "${MANIFEST}" ]; then
            # Directory: apply all YAML files with placeholder replaced
            for f in ${MANIFEST}/*.yml ${MANIFEST}/*.yaml; do
              [ -f "$f" ] || continue
              sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" "$f" \
                | kubectl apply -n "${NAMESPACE}" -f -
            done
          else
            # Single file
            sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" "${MANIFEST}" \
              | kubectl apply -n "${NAMESPACE}" -f -
          fi
 
          echo "✅ Manifest applied for ${SERVICE}"
 
      # ── 8. Wait for rollout to complete ───────────────────────────────────
      - name: Wait for rollout — ${{ inputs.service-name }}
        env:
          SERVICE:   ${{ inputs.service-name }}
          NAMESPACE: ${{ inputs.k8s-namespace }}
          TIMEOUT:   ${{ inputs.rollout-timeout }}
        run: |
          echo "⏳ Waiting for deployment/${SERVICE} to roll out (timeout: ${TIMEOUT}s)..."
          kubectl rollout status deployment/${SERVICE} \
            -n "${NAMESPACE}" \
            --timeout="${TIMEOUT}s"
 
      # ── 9. Verify pods are healthy ────────────────────────────────────────
      - name: Verify pods healthy — ${{ inputs.service-name }}
        env:
          SERVICE:   ${{ inputs.service-name }}
          NAMESPACE: ${{ inputs.k8s-namespace }}
        run: |
          kubectl wait \
            --for=condition=ready pod \
            -l app=${SERVICE} \
            -n "${NAMESPACE}" \
            --timeout=120s
          echo "✅ ${{ inputs.service-name }} is live and healthy!"
          kubectl get pods -l app=${SERVICE} -n "${NAMESPACE}"