name: "Deploy Phase 2 — Gateway & Admin"

on:
  workflow_run:
    workflows:
      - "Deploy Phase 1 — Config & Discovery"
    types:
      - completed

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
  K8S_NAMESPACE: petclinic

jobs:
  # ── Job 1: Gate — only proceed if Phase 1 succeeded ─────────────────────────
  gate:
    name: "Gate — check Phase 1 result"
    runs-on: ubuntu-latest
    steps:
      - name: Check Phase 1 conclusion
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          echo "Phase 1 conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "Phase 1 did not succeed (conclusion: $CONCLUSION). Stopping."
            exit 1
          fi
          echo "Phase 1 succeeded — proceeding with Phase 2."

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: gate
    strategy:
      matrix:
        service: [api-gateway, admin-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run unit tests — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn test --no-transfer-progress

  # ── Job 3: Build & push images ───────────────────────────────────────────────
  build-and-push:
    name: "Build & Push"
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api-gateway, admin-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/spring-petclinic/${{ matrix.service }}
        run: |
          docker build -t $IMAGE_URI:$IMAGE_TAG .
          docker tag  $IMAGE_URI:$IMAGE_TAG $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest
          echo "Pushed $IMAGE_URI:$IMAGE_TAG"

  # ── Job 4: Deploy to EKS ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # ── API Gateway ────────────────────────────────────────────────────────
      - name: "Deploy API Gateway"
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/spring-petclinic/api-gateway:${{ env.IMAGE_TAG }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/api-gateway/deployment.yaml
          kubectl apply -f k8s/api-gateway/ -n $K8S_NAMESPACE

      - name: "Wait — API Gateway rollout"
        run: |
          kubectl rollout status deployment/api-gateway \
            -n $K8S_NAMESPACE --timeout=180s

      # ── Admin Server ───────────────────────────────────────────────────────
      - name: "Deploy Admin Server"
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/spring-petclinic/admin-server:${{ env.IMAGE_TAG }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/admin-server/deployment.yaml
          kubectl apply -f k8s/admin-server/ -n $K8S_NAMESPACE

      - name: "Wait — Admin Server rollout"
        run: |
          kubectl rollout status deployment/admin-server \
            -n $K8S_NAMESPACE --timeout=180s

      # ── Smoke test: confirm ALB is reachable ───────────────────────────────
      - name: "Smoke test — API Gateway ALB"
        run: |
          echo "Fetching ALB hostname ..."
          ALB_HOST=$(kubectl get svc api-gateway -n $K8S_NAMESPACE \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo "ALB host: $ALB_HOST"
          echo "Waiting for ALB to propagate ..."

          for i in $(seq 1 24); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "http://$ALB_HOST/actuator/health" || true)
            echo "  attempt $i — HTTP $HTTP_CODE"
            [ "$HTTP_CODE" = "200" ] && { echo "API Gateway is UP"; break; }
            [ "$i" -eq 24 ] && { echo "ALB smoke test timed out"; exit 1; }
            sleep 15
          done

      - name: "Phase 2 complete"
        run: |
          echo "================================================"
          echo " Phase 2 SUCCESS"
          echo " API Gateway  — LoadBalancer live on :8080"
          echo " Admin Server — internal ingress on :9090"
          echo " Application is now reachable by users."
          echo " Phase 3 can now start."
          echo "================================================"
