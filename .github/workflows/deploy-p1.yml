name: "Deploy Phase 1 — Config & Discovery"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - "k8s/config-server/**"
      - "k8s/discovery-server/**"

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  K8S_NAMESPACE: petclinic

jobs:
  # ── Job 1: Unit tests ────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [config-server, discovery-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run unit tests — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn test --no-transfer-progress

  # ── Job 2: Build & push images ───────────────────────────────────────────────
  build-and-push:
    name: "Build & Push"
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [config-server, discovery-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/spring-petclinic/${{ matrix.service }}
        run: |
          docker build -t $IMAGE_URI:$IMAGE_TAG .
          docker tag  $IMAGE_URI:$IMAGE_TAG $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest
          echo "Pushed $IMAGE_URI:$IMAGE_TAG"

  # ── Job 3: Deploy to EKS ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # ── Config Server ──────────────────────────────────────────────────────
      - name: "Deploy Config Server"
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/spring-petclinic/config-server:${{ env.IMAGE_TAG }}
        run: |
          # Patch the image tag in the manifest before applying
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/config-server/deployment.yaml
          kubectl apply -f k8s/config-server/ -n $K8S_NAMESPACE

      - name: "Wait — Config Server rollout"
        run: |
          kubectl rollout status deployment/config-server \
            -n $K8S_NAMESPACE --timeout=180s

      - name: "Health check — Config Server"
        run: |
          echo "Probing Config Server /actuator/health ..."
          for i in $(seq 1 20); do
            STATUS=$(kubectl exec -n $K8S_NAMESPACE \
              deploy/config-server -- \
              curl -sf http://localhost:8888/actuator/health \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
            echo "  attempt $i — status: $STATUS"
            [ "$STATUS" = "UP" ] && { echo "Config Server is UP"; break; }
            [ "$i" -eq 20 ] && { echo "Config Server health check timed out"; exit 1; }
            sleep 10
          done

      # ── Discovery Server ───────────────────────────────────────────────────
      - name: "Deploy Discovery Server"
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/spring-petclinic/discovery-server:${{ env.IMAGE_TAG }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/discovery-server/deployment.yaml
          kubectl apply -f k8s/discovery-server/ -n $K8S_NAMESPACE

      - name: "Wait — Discovery Server rollout"
        run: |
          kubectl rollout status deployment/discovery-server \
            -n $K8S_NAMESPACE --timeout=180s

      - name: "Health check — Discovery Server"
        run: |
          echo "Probing Discovery Server /actuator/health ..."
          for i in $(seq 1 20); do
            STATUS=$(kubectl exec -n $K8S_NAMESPACE \
              deploy/discovery-server -- \
              curl -sf http://localhost:8761/actuator/health \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
            echo "  attempt $i — status: $STATUS"
            [ "$STATUS" = "UP" ] && { echo "Discovery Server is UP"; break; }
            [ "$i" -eq 20 ] && { echo "Discovery Server health check timed out"; exit 1; }
            sleep 10
          done

      - name: "Phase 1 complete"
        run: |
          echo "================================================"
          echo " Phase 1 SUCCESS"
          echo " Config Server    — healthy on :8888"
          echo " Discovery Server — healthy on :8761"
          echo " Phase 2 can now start."
          echo "================================================"
