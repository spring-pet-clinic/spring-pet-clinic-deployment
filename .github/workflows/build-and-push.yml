name: Build and Push PetClinic Images to ECR

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  MICROSERVICES_REPO: spring-pet-clinic/spring-petclinic-microservices
  MICROSERVICES_REF: main

jobs:
  build-and-push:
    name: Build and push all 8 service images to ECR
    runs-on: ubuntu-latest

    steps:

      - name: Checkout deployment repo (this repo — contains build script)
        uses: actions/checkout@v4

      - name: Checkout microservices source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MICROSERVICES_REPO }}
          ref: ${{ env.MICROSERVICES_REF }}
          path: microservices

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: microservices/**/pom.xml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Make build script executable
        run: chmod +x ./scripts/build-and-push.sh

      - name: Build and push all images
        working-directory: ./microservices
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_TAG: ${{ github.sha }}
        run: ${{ github.workspace }}/scripts/build-and-push.sh

      - name: Confirm images pushed to ECR
        run: |
          echo "Pipeline complete. Verifying config-server..."
          aws ecr describe-images \
            --repository-name spring-petclinic-config-server \
            --region ${{ env.AWS_REGION }} \
            --query "imageDetails[*].{Tags:imageTags,Pushed:imagePushedAt}" \
            --output table
