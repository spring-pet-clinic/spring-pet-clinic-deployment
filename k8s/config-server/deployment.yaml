# Config Server — must be healthy before all other services start
# SPCAD-21 | Deploy Services 1–3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: spring-petclinic-ireland
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: 135728714831.dkr.ecr.eu-west-1.amazonaws.com/spring-petclinic-config-server:latest
          ports:
            - containerPort: 8888
            - containerPort: 8889
              name: management
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: MANAGEMENT_SERVER_PORT
              value: "8889"
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "300m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8889
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8889
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: spring-petclinic-ireland
spec:
  selector:
    app: config-server
  ports:
    - name: http
      protocol: TCP
      port: 8888
      targetPort: 8888
    - name: management
      protocol: TCP
      port: 8889
      targetPort: 8889
  type: ClusterIP
