prometheus:
  prometheusSpec:
    scrapeInterval: 15s
    # Serve from /prometheus so it works behind the shared ALB Ingress.
    routePrefix: /prometheus
    externalUrl: /prometheus
    additionalScrapeConfigs:
      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway.spring-petclinic-ireland.svc.cluster.local:8090']

      - job_name: 'customers-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['customers-service.spring-petclinic-ireland.svc.cluster.local:8081']

      - job_name: 'vets-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['vets-service.spring-petclinic-ireland.svc.cluster.local:8083']

      - job_name: 'visits-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['visits-service.spring-petclinic-ireland.svc.cluster.local:8082']

      - job_name: 'config-server'
        metrics_path: '/prometheus'
        static_configs:
          - targets: ['config-server.spring-petclinic-ireland.svc.cluster.local:8888']

      - job_name: 'discovery-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['discovery-server.spring-petclinic-ireland.svc.cluster.local:8761']

      - job_name: 'admin-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['admin-server.spring-petclinic-ireland.svc.cluster.local:9090']

      - job_name: 'genai-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['genai-service.spring-petclinic-ireland.svc.cluster.local:8084']

alertmanager:
  enabled: true

grafana:
  enabled: true
  adminPassword: MyStrongPassword123
  service:
    type: ClusterIP
  # Serve from /grafana so it works behind the shared ALB Ingress.
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
